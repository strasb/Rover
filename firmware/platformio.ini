; LILYGO T-2CAN (ESP32-S3) – ODrive CAN controller
; Board specs: 16 MB Flash, 8 MB OPI-PSRAM, USB-JTAG/Serial
[env:lilygo-t2can]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash / PSRAM ──────────────────────────────────────────────────────────
board_build.flash_size          = 16MB
board_build.partitions          = default_16MB.csv
board_upload.flash_size         = 16MB
board_build.arduino.memory_type = qio_opi   ; OPI-PSRAM (8 MB)

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Un-comment and adjust if USB-CDC is the upload port:
    ; -DARDUINO_USB_CDC_ON_BOOT=1

; ── Monitor ────────────────────────────────────────────────────────────────
monitor_speed = 115200

; ── Dependencies ───────────────────────────────────────────────────────────
; MCP_CAN_lib by coryjfowler – used for MCP2515 (CANA port)
lib_deps =
    coryjfowler/MCP_CAN_lib @ ^1.5.0
